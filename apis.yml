aid: amazon-privatelink
name: Amazon PrivateLink
description: >-
  AWS PrivateLink provides private connectivity between virtual private clouds
  (VPCs), AWS services, and your on-premises networks without exposing your
  traffic to the public internet. It makes it easy to connect services across
  different accounts and VPCs to simplify your network architecture.
